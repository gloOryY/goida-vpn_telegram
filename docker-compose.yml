version: '3.9'

services:
  # ─── Databases ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: goida-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goida_secret}
      POSTGRES_DB: ${POSTGRES_DB:-goida_vpn}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-goida}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goida-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: goida-api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTH_SERVICE_URL: http://auth-service:3001
      VPN_SERVICE_URL: http://vpn-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: goida-auth-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-goida}:${POSTGRES_PASSWORD:-goida_secret}@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  vpn-service:
    build:
      context: ./apps/vpn-service
      dockerfile: Dockerfile
    container_name: goida-vpn-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-goida}:${POSTGRES_PASSWORD:-goida_secret}@postgres:5432/vpn_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build:
      context: ./apps/payment-service
      dockerfile: Dockerfile
    container_name: goida-payment-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-goida}:${POSTGRES_PASSWORD:-goida_secret}@postgres:5432/payment_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/health']
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    container_name: goida-notification-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-goida}:${POSTGRES_PASSWORD:-goida_secret}@postgres:5432/notification_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change_internal_secret}
      QUEUE_INTERVAL_MS: 10000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3004/health']
      interval: 30s
      timeout: 10s
      retries: 3

  telegram-bot:
    build:
      context: ./apps/telegram-bot
      dockerfile: Dockerfile
    container_name: goida-telegram-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_GATEWAY_URL: http://api-gateway:3000
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: goida-network
